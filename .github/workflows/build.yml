name: build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-24.04
    environment: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s (%h)" HEAD >> $GITHUB_OUTPUT
          else
            git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..HEAD >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download or build deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build
        run: |
          cd buildscripts
          ./buildall.sh --arch arm64 mpv
          ./buildall.sh --arch arm64 mpv-android

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE secret is missing. Skipping signing."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          
          # We only built arm64
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*arm64-v8a-release-unsigned.apk" | head -n 1)
          [ -z "$UNSIGNED_APK" ] && UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          $APKSIGNER sign --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out mpv-android-arm64-release.apk \
            $UNSIGNED_APK

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpv-android-arm64
          path: |
            app/build/outputs/apk/**/*.apk
            mpv-android-arm64-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ### Changes in this release:
            ${{ steps.changelog.outputs.CHANGES }}
          files: mpv-android-arm64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
